name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - run: npm run lint

      - run: npm run typecheck

      - run: npm run test

      - run: npm run build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/docquery
          AUTH_SECRET: ci-build-secret-replace-in-production
          NEXT_PUBLIC_APP_URL: http://localhost:3000
