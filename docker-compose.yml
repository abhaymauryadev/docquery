services:
  postgres:
    image: pgvector/pgvector:pg18
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: docquery
    ports:
      - "5433:5432"
    volumes:
      - docquery_pgdata:/var/lib/postgresql

volumes:
  docquery_pgdata:
